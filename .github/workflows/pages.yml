name: Test and deploy Colonial beta

on:
  push:
    branches: [main]
    paths:
      - 'release/v2/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Reconstruct release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release
          cat release/v2/parts/part-* | tr -d '\n\r' | base64 --decode > .release/source.tar.gz
          echo '6c913ca075b91fd55bb5dc0b283f539fa32526f7fd87700de8af70d310368569  .release/source.tar.gz' | sha256sum --check --strict
          tar -xzf .release/source.tar.gz -C .release
          test -f .release/index.html
          test -f .release/package.json

      - name: Run calculation tests
        working-directory: .release
        run: npm test

      - name: Validate JavaScript syntax
        working-directory: .release
        run: |
          node --check core.js
          node --check game-data.js
          node --check app.js
          node --check sw.js

      - name: Report successful tests
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/tests' \
            -f description='Player UX and calculation tests passed' \
            -f target_url="$TARGET_URL"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static application
        uses: actions/upload-pages-artifact@v4
        with:
          path: .release

      - name: Report successful Pages preparation
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/pages-build' \
            -f description='Pages artifact prepared' \
            -f target_url="$TARGET_URL"

      - name: Report build failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='tropico/pages-build' \
            -f description='Tests or Pages preparation failed' \
            -f target_url="$TARGET_URL"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report successful deployment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/pages-deploy' \
            -f description='Colonial beta v0.2.0 is live' \
            -f target_url="$TARGET_URL"

      - name: Report deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='tropico/pages-deploy' \
            -f description='GitHub Pages deployment failed' \
            -f target_url="$TARGET_URL"
