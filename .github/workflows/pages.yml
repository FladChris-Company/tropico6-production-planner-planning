name: Test and deploy Colonial beta

on:
  push:
    branches: [main]
    paths:
      - 'release/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Reconstruct tested release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release
          cat release/parts/part-* | tr -d '\n\r' | base64 --decode > .release/release.tar.gz
          tar -xzf .release/release.tar.gz -C .release
          test -f .release/app/index.html
          test -f .release/package.json

      - name: Run calculation tests
        working-directory: .release
        run: npm test

      - name: Validate JavaScript syntax
        working-directory: .release
        run: |
          node --check app/core.js
          node --check app/game-data.js
          node --check app/app.js
          node --check app/sw.js

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static application
        uses: actions/upload-pages-artifact@v4
        with:
          path: .release/app

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
