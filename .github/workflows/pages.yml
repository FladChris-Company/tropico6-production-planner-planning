name: Test and deploy Svelte app

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check types and components
        run: npm run check

      - name: Run calculation tests
        run: npm test

      - name: Build static application
        run: npm run build

      - name: Report successful tests
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/tests' \
            -f description='Player UX and calculation tests passed' \
            -f target_url="$TARGET_URL"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static application
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

      - name: Report successful Pages preparation
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/pages-build' \
            -f description='Pages artifact prepared' \
            -f target_url="$TARGET_URL"

      - name: Report build failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='tropico/pages-build' \
            -f description='Tests or Pages preparation failed' \
            -f target_url="$TARGET_URL"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report successful deployment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='tropico/pages-deploy' \
            -f description='Colonial Svelte planner is live' \
            -f target_url="$TARGET_URL"

      - name: Report deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='tropico/pages-deploy' \
            -f description='GitHub Pages deployment failed' \
            -f target_url="$TARGET_URL"
